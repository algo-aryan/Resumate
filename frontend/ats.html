<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>ATS Resume Score</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
 rel="stylesheet">
 <script src="https://cdn.lordicon.com/lordicon.js"></script>

 
  <link rel="stylesheet" href="css/ats.css" />
</head>

<body>
 <div class="container py-5">
 <div class="back-to-dashboard-container">
 <a href="dashboard.html" class="back-to-dashboard-btn">← Back to Dashboard</a>
 </div>

 <h2 class="text-center mb-4">ATS Resume Scoring</h2>

 <form id="resume-form" class="card shadow p-4" enctype="multipart/form-data" method="post">
 <div class="mb-3">
 <label for="resume" class="form-label">Upload Your Resume (PDF):</label>
 <div class="file-input-wrapper">
 <span id="file-name-display" class="file-input-display">No file chosen</span>
 <input class="form-control" type="file" id="resume" name="resume" accept="application/pdf" required>
 </div>
 <div class="mb-4">
 <label for="jobDescription" class="form-label">Job Description (Optional, for specific match):</label>
 <textarea class="form-control" id="jobDescription" name="jobDescription" rows="4" placeholder="Paste the job description here to evaluate your resume against it..." style="background-color: var(--glass-overlay); color: var(--text-body); border-color: var(--border-color);"></textarea>
 </div>
 <button type="submit" class="btn btn-primary">
 <span class="button-text">Get ATS Score</span>
 <div class="spinner-border text-light" role="status">
 <span class="visually-hidden">Loading...</span>
 </div>
 </button>
 </form>

 <!-- ATS Error Display Element -->
 <div id="atsErrorDisplay" class="error-message hidden">
 <!-- Error messages will be displayed here -->
 </div>

 <div id="result-container" class="mt-5 d-none">
 <h4 class="mb-3">ATS Score: <span id="score" class="badge bg-success fs-5"></span></h4>
 <p id="summary" class="fst-italic text-muted"></p>

 <div class="mt-4">
 <h5>Strengths</h5>
 <ul id="strengths" class="list-group list-group-flush"></ul>
 </div>

 <div class="mt-4">
 <h5>🛠 Suggestions for Improvement</h5>
 <ul id="suggestions" class="list-group list-group-flush"></ul>
 </div>
 </div>
 </div>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
  <script src="js/ats.js"></script>
</body>

</html>
